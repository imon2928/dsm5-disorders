{% extends 'master/base.html' %}

{% block body %}

<head>

    <title>Category</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Tiro+Bangla&family=Hind+Siliguri:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --forest: #1B4332;
            --forest-deep: #102A20;
            --sage: #74A57F;
            --sage-soft: #AEC9A8;
            --paper: #F6F3EA;
            --paper-line: #E4DEC9;
            --ink: #20251F;
            --ink-soft: #52584C;
            --coral: #C97B5C;
            --mint: #E9EFE3;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--paper);
            color: var(--ink);
            font-family: 'Hind Siliguri', 'Inter', sans-serif;
        }

        .ruled-top {
            height: 8px;
            background: repeating-linear-gradient(90deg, var(--forest) 0 22px, transparent 0 28px);
            opacity: .85;
        }

        header {
            background: var(--forest);
            color: var(--mint);
            padding: 16px 6vw;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .brand img {
            width: 44px;
            height: 44px;
        }

        .brand-text .site-name {
            font-family: 'Tiro Bangla', serif;
            font-size: 1.1rem;
            color: #fff;
        }

        .brand-text .sub {
            font-size: .62rem;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--sage-soft);
        }

        .back-btn {
            color: var(--mint);
            text-decoration: none;
            font-size: .88rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(255, 255, 255, .25);
            padding: 8px 18px;
            border-radius: 20px;
            transition: .2s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, .1);
        }

        .hero {
            background: var(--mint);
            padding: 60px 6vw 50px;
            border-bottom: 1px solid var(--paper-line);
        }

        .hero-inner {
            max-width: 1100px;
            margin: 0 auto;
        }

        .breadcrumb {
            font-size: .76rem;
            color: var(--ink-soft);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .breadcrumb a {
            color: var(--forest);
            text-decoration: none;
        }

        .breadcrumb span {
            color: var(--ink-soft);
        }

        .cat-headline {
            font-family: 'Tiro Bangla', serif;
            font-size: clamp(1.8rem, 3.5vw, 2.8rem);
            color: var(--forest-deep);
            line-height: 1.25;
            margin-bottom: 12px;
        }

        .cat-sub {
            color: var(--ink-soft);
            font-size: 1rem;
            line-height: 1.6;
            max-width: 600px;
        }

        .dsm-badge {
            display: inline-block;
            background: var(--forest);
            color: #fff;
            font-size: .7rem;
            font-weight: 600;
            letter-spacing: .1em;
            padding: 4px 12px;
            border-radius: 20px;
            margin-top: 18px;
            text-transform: uppercase;
        }

        main {
            padding: 60px 6vw 80px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .disorders-heading {
            font-family: 'Tiro Bangla', serif;
            font-size: 1.2rem;
            color: var(--forest);
            margin-bottom: 28px;
            padding-bottom: 14px;
            border-bottom: 2px solid var(--paper-line);
        }

        .disorders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .disorder-card {
            background: #fff;
            border: 1px solid var(--paper-line);
            border-radius: 4px;
            overflow: hidden;
            transition: .2s;
            cursor: pointer;
        }

        .disorder-card:hover {
            border-color: var(--sage);
            box-shadow: 0 8px 24px rgba(27, 67, 50, .09);
            transform: translateY(-2px);
        }

        .disorder-card-header {
            background: var(--forest);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .disorder-card-header h3 {
            font-family: 'Tiro Bangla', serif;
            font-size: 1rem;
            color: #fff;
            margin: 0;
        }

        .disorder-num {
            font-size: .72rem;
            color: var(--sage-soft);
            font-weight: 600;
        }

        .disorder-card-body {
            padding: 0;
        }

        .content-type {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            border-bottom: 1px dashed var(--paper-line);
            cursor: pointer;
            transition: .15s;
        }

        .content-type:last-child {
            border-bottom: none;
        }

        .content-type:hover {
            background: var(--mint);
        }

        .ct-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            flex: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ct-icon.neuro {
            background: #E8F4F0;
        }

        .ct-icon.psych {
            background: #FDF0E8;
        }

        .ct-icon.dsm {
            background: #EEF3E8;
        }

        .ct-icon svg {
            width: 16px;
            height: 16px;
        }

        .ct-label {
            flex: 1;
        }

        .ct-label strong {
            display: block;
            font-size: .88rem;
            color: var(--forest-deep);
            font-weight: 700;
        }

        .ct-label span {
            font-size: .74rem;
            color: var(--ink-soft);
        }

        .ct-arrow {
            color: var(--sage);
            font-size: 1rem;
        }

        footer-bar {
            display: block;
            text-align: center;
            padding: 28px;
            font-size: .8rem;
            color: var(--ink-soft);
            border-top: 1px solid var(--paper-line);
            margin-top: 40px;
        }

        @media(max-width:640px) {
            .disorders-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>

</head>

<body>

        <div class="hero-inner">
